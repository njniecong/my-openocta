# 与主配置合并，用于把 Wails 打好的 .dmg 附加到 GitHub / GitLab Release。
#
# 仅在「已生成 dist/OpenOcta*.dmg」时使用（例如 macos-latest + GORELEASER_INCLUDE_DMG=1）。
# Linux-only 流水线不要传入本文件，否则 glob 可能无匹配导致发布失败。
#
# 示例（GitHub Release）：
#   export GORELEASER_INCLUDE_DMG=1
#   export GITHUB_TOKEN=...
#   goreleaser release -f .goreleaser.yaml -f .goreleaser.dmg.yaml --clean
#
version: 2

release:
  # 与主配置 release 深度合并：勿在此处写 gitlab/github，避免覆盖；在 .goreleaser.yaml 里配置真正的发布目标。
  extra_files:
    - glob: ./dist/OpenOcta*.dmg
